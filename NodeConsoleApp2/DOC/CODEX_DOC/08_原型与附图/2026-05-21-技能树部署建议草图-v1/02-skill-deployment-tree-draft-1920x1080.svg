  <g transform="translate(1448 360)">
    <rect width="360" height="244" rx="22" fill="#ffffff" stroke="#d2d8dc" stroke-width="2"/>
    <text x="28" y="42" class="legend">关键调整点</text>
    <text x="28" y="78" class="small">1. 自由横跳靠虚线桥接，不靠互斥路线。</text>
    <text x="28" y="112" class="small">2. 梗名保留，但描述、动作、Buff 必须一致。</text>
    <text x="28" y="146" class="small">3. 需要新增/补全的不是大量技能，</text>
    <text x="48" y="172" class="small">而是少量“机制 Buff”。</text>
    <text x="28" y="206" class="small">4. 测试/演示节点继续隐藏或迁出正式包。</text>
  </g>

  <g transform="translate(1448 640)">
