    <text x="28" y="42" class="legend" fill="#f5f0e8">建议 KP 节奏</text>
    <text x="28" y="80" class="small" fill="#f5f0e8">入口：1-2 KP，第一关就能换方向。</text>
    <text x="28" y="116" class="small" fill="#f5f0e8">桥接：2-3 KP，第二三关形成组合。</text>
    <text x="28" y="152" class="small" fill="#f5f0e8">核心：3-5 KP，让构筑开始成型。</text>
    <text x="28" y="188" class="small" fill="#f5f0e8">终局：8 KP，只奖励已成型玩法。</text>
