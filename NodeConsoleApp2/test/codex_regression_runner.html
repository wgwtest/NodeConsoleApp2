    const summaryEl = document.getElementById('summary');

    const lines = [];

    function log(text) {
      lines.push(text);
      logEl.textContent = lines.join('\n');
      console.log(text);
    }

    function assert(condition, message) {
      if (!condition) throw new Error(message);
    }

    const contentConfigUrl = '../assets/data/config.json';
    let contentConfigCache = null;
    async function loadContentConfig() {
      if (!contentConfigCache) {
        contentConfigCache = await fetch(contentConfigUrl, { cache: 'no-store' }).then(r => r.json());
      }
      return contentConfigCache;
    }

    function normalizeContentUrl(input, base = null) {
      if (!input || typeof input !== 'string') return input;
      if (/^https?:\/\//i.test(input)) return input;
      if (input.startsWith('/')) return input;
      if (base) {
        try {
          return new URL(input, base).toString();
        } catch {
          // fall through
        }
      }
      if (input.startsWith('./')) return `/${input.slice(2)}`;
      if (input.startsWith('../')) return input;
      return input;
    }

    async function fetchRegistryJson(contentKey, options = {}) {
      const config = await loadContentConfig();
      const registry = config.contentRegistry || {};
      const originBase = `${window.location.origin}/`;
      const basePath = normalizeContentUrl(config.basePath || '', originBase) || '';
      let entry = registry[contentKey];
      if (!entry) {
        throw new Error(`contentRegistry 缺少 ${contentKey}`);
      }
      if (contentKey === 'skills' && options.skillTreeId && entry.byTree && entry.byTree[options.skillTreeId]) {
        entry = entry.byTree[options.skillTreeId];
      }
      const path = entry.path;
      if (!path) {
        throw new Error(`${contentKey} 缺少 path`);
      }
      const normalizedFile = normalizeContentUrl(path, null);
      const resolvedContentUrl = basePath
        ? (normalizedFile.startsWith('http') || normalizedFile.startsWith('/')
            ? normalizedFile
            : `${basePath}${normalizedFile}`)
        : normalizedFile;
      return fetch(resolvedContentUrl, { cache: 'no-store' }).then(r => r.json());
    }

    function createEventBus() {
      return {
        on() {},
        emit() {}
      };
    }

    function createBattleDriver(eventBus) {
      const driver = Object.create(CoreEngine.prototype);
      driver.eventBus = eventBus;
      return driver;
    }

    function createCombatant({
      id,
      hp = 100,
      maxHp = 100,
      ap = 3,
      speed = 5,
      bodyParts = {}
    }) {
      return {
        id,
        stats: { hp, maxHp, ap, speed },
        bodyParts: JSON.parse(JSON.stringify(bodyParts))
      };
    }

    function getWrappedLevels(levelPack) {
      assert(levelPack && typeof levelPack === 'object', 'levels pack 未成功加载');
      assert(levelPack.$schemaVersion === 'levels_v1_wrapped', `levels pack schemaVersion 错误: ${levelPack.$schemaVersion}`);
      assert(levelPack.meta && typeof levelPack.meta === 'object', 'levels pack 缺少 meta');
      assert(levelPack.enemyPools && typeof levelPack.enemyPools === 'object', 'levels pack 缺少 enemyPools');
      assert(levelPack.levels && typeof levelPack.levels === 'object', 'levels pack 缺少 levels');
      return levelPack.levels;
    }

    function resolveLevelWaveEnemyRefs(levelPack, wave) {
      assert(wave && typeof wave === 'object', 'wave 缺失');
      const enemyPools = levelPack.enemyPools || {};
      const poolId = wave.enemyPoolId;
      assert(typeof poolId === 'string' && poolId.length > 0, 'wave.enemyPoolId 缺失');
      const pool = enemyPools[poolId];
      assert(pool && typeof pool === 'object', `enemyPool 不存在: ${poolId}`);
      assert(Array.isArray(pool.members) && pool.members.length > 0, `enemyPool.members 为空: ${poolId}`);
      return pool.members;
    }

    async function testContentRegistryProvidesUnifiedLoaderBoundary() {
      const config = await loadContentConfig();
      const registry = config.contentRegistry;
      assert(registry && typeof registry === 'object', 'config.json 缺少 contentRegistry');

      for (const key of ['player', 'items', 'skills', 'buffs', 'enemies', 'levels']) {
        assert(registry[key], `contentRegistry 缺少 ${key}`);
        assert(typeof registry[key].path === 'string' && registry[key].path.length > 0, `${key} 缺少 path`);
        assert(typeof registry[key].kind === 'string' && registry[key].kind.length > 0, `${key} 缺少 kind`);
      }

      assert(registry.skills.byTree && typeof registry.skills.byTree === 'object', 'skills contentRegistry 缺少 byTree');
      assert(registry.skills.byTree.melee_v4_5?.path === 'skills_melee_v4_5.json', `skills.byTree.melee_v4_5 路径错误: ${registry.skills.byTree.melee_v4_5?.path}`);
      assert(registry.buffs.schemaVersion === 'buffs_v2_1_wrapped', `buffs schemaVersion 错误: ${registry.buffs.schemaVersion}`);

      assert(typeof DataManager._buildContentRegistry === 'function', 'DataManagerV2 缺少 _buildContentRegistry');
      const normalized = DataManager._buildContentRegistry(config);
      assert(normalized?.skills?.byTree?.melee_v4_5?.path === 'skills_melee_v4_5.json', 'DataManager._buildContentRegistry 未保留 skills.byTree');
      assert(normalized?.buffs?.schemaVersion === 'buffs_v2_1_wrapped', 'DataManager._buildContentRegistry 未保留 buffs schemaVersion');
    }

    async function testDataManagerSupportsRuntimeSkillPackOverrideBridge() {
      const basePack = await fetchRegistryJson('skills', { skillTreeId: 'melee_v4_5' });
      const overridePack = JSON.parse(JSON.stringify(basePack));
      const overrideSkill = overridePack.skills.find(skill => skill.id === 'skill_heal');
      assert(overrideSkill, '缺少运行时覆写探针技能 skill_heal');
      overrideSkill.name = '治疗·运行时覆写样本';

      clearContentPackOverride('skills', 'melee_v4_5');
      setContentPackOverride('skills', overridePack, 'melee_v4_5');

      try {
        const storedRaw = localStorage.getItem(CONTENT_PACK_OVERRIDE_STORAGE_KEY) || '';
        assert(storedRaw.includes(buildContentPackOverrideKey('skills', 'melee_v4_5')), 'localStorage 未写入 skills:melee_v4_5 覆写键');

        const fromStore = getContentPackOverride('skills', 'melee_v4_5');
        assert(fromStore?.skills?.find(skill => skill.id === 'skill_heal')?.name === '治疗·运行时覆写样本', 'override store 未返回技能覆写产物');

        const dm = Object.create(Object.getPrototypeOf(DataManager));
        const fromManager = DataManager._getContentPackOverride.call(dm, 'skills', { selectedTreeId: 'melee_v4_5' });
        assert(fromManager?.skills?.find(skill => skill.id === 'skill_heal')?.name === '治疗·运行时覆写样本', 'DataManager 未读取 skills:treeId 覆写产物');
      } finally {
        clearContentPackOverride('skills', 'melee_v4_5');
      }
    }

    function testCoreEngineLearnSkillConsumesDataBoundary() {
      const engine = Object.create(CoreEngine.prototype);
      let saveCalls = 0;
      let emitted = null;
      engine.data = {
        playerData: {
          skills: {
            learned: [],
            skillPoints: 3
          }
        },
        getSkillConfig(skillId) {
          if (skillId !== 'skill_a') return null;
          return {
            id: 'skill_a',
            prerequisites: [],
            unlock: {
              cost: {
                kp: 2
              },
              exclusives: []
            }
          };
        },
        saveGame() {
          saveCalls += 1;
        }
      };
      engine.eventBus = {
        emit(eventName, payload) {
          emitted = { eventName, payload };
        }
      };

      engine.learnSkill('skill_a');

      assert(engine.data.playerData.skills.learned.includes('skill_a'), 'learnSkill 未通过 data boundary 学习技能');
      assert(engine.data.playerData.skills.skillPoints === 1, `learnSkill 未正确扣除 KP: ${engine.data.playerData.skills.skillPoints}`);
      assert(saveCalls === 1, `learnSkill 未触发 saveGame: ${saveCalls}`);
      assert(emitted?.eventName === 'DATA_UPDATE', `learnSkill 未发出 DATA_UPDATE: ${emitted?.eventName}`);
    }

    async function testCoreEngineInitConsumesBuffDataBoundary() {
      let registryDefinitions = null;
      let buffSystemStartCalls = 0;
      let loopStartCalls = 0;
      const transitions = [];

      const engine = Object.create(CoreEngine.prototype);
      engine.fsm = {
        changeState(next) {
          transitions.push(next);
        }
      };
      engine.data = {
        async loadConfigs() {},
        getBuffDefinitions() {
          return {
            buff_a: { id: 'buff_a', name: 'Buff A' }
          };
        },
        gameConfig: {}
      };
      engine.buffRegistry = {
        setDefinitions(definitions) {
          registryDefinitions = definitions;
        }
      };
      engine.buffSystem = {
        start() {
          buffSystemStartCalls += 1;
        }
      };
      engine.loop = {
        start() {
          loopStartCalls += 1;
        }
      };

      await CoreEngine.prototype.init.call(engine);

      assert(registryDefinitions?.buff_a?.id === 'buff_a', 'CoreEngine.init 未通过 DataManager buff boundary 注入定义');
      assert(buffSystemStartCalls === 1, `BuffSystem.start 调用次数错误: ${buffSystemStartCalls}`);
      assert(loopStartCalls === 1, `loop.start 调用次数错误: ${loopStartCalls}`);
      assert(transitions.includes('INIT') && transitions.includes('LOGIN'), `状态切换不完整: ${transitions.join(', ')}`);
    }

    async function testAcceptanceLevelProvidesManualVerificationEntry() {
      const [levelsPack, enemies, skills] = await Promise.all([
        fetchRegistryJson('levels'),
        fetchRegistryJson('enemies'),
        fetchRegistryJson('skills', { skillTreeId: 'melee_v4_5' })
      ]);
      const levels = getWrappedLevels(levelsPack);

      const level = levels.level_1_2_acceptance;
      assert(level, '缺少人工验收关卡 level_1_2_acceptance');
      const waveEnemies = resolveLevelWaveEnemyRefs(levelsPack, level.waves?.[0]);
      assert(waveEnemies?.[0]?.templateId === 'enemy_acceptance_guard', `验收关卡未接入样本敌人: ${waveEnemies?.[0]?.templateId}`);

      const enemy = enemies.enemy_acceptance_guard;
      assert(enemy, '缺少样本敌人 enemy_acceptance_guard');
      assert(Array.isArray(enemy.skills) && enemy.skills.includes('skill_block'), '样本敌人缺少修甲技能 skill_block');
      assert(Array.isArray(enemy.skills) && enemy.skills.includes('skill_heal'), '样本敌人缺少回血技能 skill_heal');

      const skillList = Array.isArray(skills.skills) ? skills.skills : [];
      const byId = (id) => skillList.find(skill => skill.id === id);

      assert(byId('skill_demo_hp_guard'), '缺少人工验收技能 skill_demo_hp_guard');
      assert(byId('skill_demo_armor_guard'), '缺少人工验收技能 skill_demo_armor_guard');

      assert(byId('skill_demo_enemy_head_tap'), '缺少护甲验收敌人攻击技能 skill_demo_enemy_head_tap');

    async function testEnemyPlannerPrefersHealWhenLowHp() {
      const skills = {
        skill_bite: {
          id: 'skill_bite',
          target: {
            subject: 'SUBJECT_ENEMY',
            scope: 'SCOPE_PART',

          speed: 0
        },
        skill_recover: {
          id: 'skill_recover',
          target: {
            subject: 'SUBJECT_SELF',
            scope: 'SCOPE_ENTITY',
            selection: {}
          },
          actions: [{ effect: { effectType: 'HEAL', amount: 20 } }],
          costs: { ap: 1 },
          speed: 2
        }
      };

      const planner = new EnemyActionPlanner({
        getSkillConfig: (skillId) => skills[skillId]
      });

      const enemy = {
        id: 'enemy_1',
        stats: { hp: 18, maxHp: 100, speed: 5, ap: 3 },
        bodyParts: {
          head: { current: 10, max: 10, weakness: 1 },
          chest: { current: 20, max: 20, weakness: 1 },
          abdomen: { current: 10, max: 10, weakness: 1 }
        },
        skills: ['skill_bite', 'skill_recover']
      };

      const player = {
        id: 'player_1',
        stats: { hp: 100, maxHp: 100 },
        bodyParts: {
          head: { current: 15, max: 15, weakness: 1.4 },
          chest: { current: 20, max: 20, weakness: 1 },
          abdomen: { current: 20, max: 20, weakness: 1 }
        }
      };

      const plan = planner.planTurn({ enemy, player, playerBodyParts: player.bodyParts });
      assert(plan, 'EnemyActionPlanner 未返回低血量规划结果');
      assert(plan.skillId === 'skill_recover', `低血量敌人未优先回血，实际选择: ${plan.skillId}`);
      assert(plan.targetId === 'enemy_1', `回血技能目标错误: ${plan.targetId}`);
    }

    function testTurnPlannerUsesSlotPartForMultiSelect() {
      const planner = new TurnPlanner({
        getSlotLayout: () => ({
          slotCounts: {
            head: { enemy: 1, self: 1 },
            chest: { enemy: 1, self: 1 }
          }
        }),
        getPlayerId: () => 'player_1',
        getSkillConfig: () => ({
          id: 'skill_multi',
          target: {
            selection: {
              selectCount: 4
            }
          }
        }),
        getCurrentAp: () => 10,
        getUsedAp: () => 0
      });

      planner.enterPlanning({
        availableAp: 10,
        effectiveApCostBySkill: { skill_multi: 1 }
      });

      const result = planner.planMany({
        planningDraftBySkill: {
          skill_multi: {
            skillId: 'skill_multi',
            targetId: 'enemy_1',
            bodyPart: 'chest',
            cost: 1,
            speed: 0,
            placedSlots: ['enemy:head:0', 'enemy:chest:0'],
            selectionResult: { selectedParts: ['head', 'chest'] }
          }
        }
      });

      assert(result.ok, 'TurnPlanner.planMany 返回失败');
      const actions = planner.getPlannedActions();
      assert(actions.length === 2, 'TurnPlanner 未生成 2 个动作');
      assert(actions[0].bodyPart === 'head', `第 1 个动作 bodyPart 错误: ${actions[0].bodyPart}`);
      assert(actions[1].bodyPart === 'chest', `第 2 个动作 bodyPart 错误: ${actions[1].bodyPart}`);
    }
