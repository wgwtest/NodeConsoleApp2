  <h1>Codex Regression Runner</h1>
  <div id="summary"></div>
  <pre id="log"></pre>

    import EventBus from '../script/engine/EventBus.js';
    import { CoreEngine } from '../script/engine/CoreEngine.js';
    import DataManager from '../script/engine/DataManagerV2.js';
    import EnemyActionPlanner from '../script/engine/EnemyActionPlanner.js';
    import { BuffRegistry, BuffManager, BuffSystem } from '../script/engine/buff/index.js';
    import TurnPlanner from '../script/engine/TurnPlanner.js';
    import UI_SkillPanel from '../script/ui/UI_SkillPanel.js';
    import { UI_SkillTreeModal } from '../script/ui/UI_SkillTreeModal.js';

    const summaryEl = document.getElementById('summary');
    const logEl = document.getElementById('log');
    const lines = [];

    function log(text) {
      lines.push(text);
      logEl.textContent = lines.join('\n');
      console.log(text);
    }

    function assert(condition, message) {
      if (!condition) throw new Error(message);
    }

    function createEventBus() {
      return {
        on() {},
        emit() {}
      };
    }

    function createBattleDriver(eventBus) {
      const driver = Object.create(CoreEngine.prototype);
      driver.eventBus = eventBus;
      return driver;
    }

    function createCombatant({
      id,
      hp = 100,
      maxHp = 100,
      ap = 3,
      speed = 5,
      bodyParts = {}
    }) {
      return {
        id,
        stats: { hp, maxHp, ap, speed },
        bodyParts: JSON.parse(JSON.stringify(bodyParts))
      };
    }

    async function testAcceptanceLevelProvidesManualVerificationEntry() {
      const [levels, enemies, skills] = await Promise.all([
        fetch('../assets/data/levels.json').then(r => r.json()),
        fetch('../assets/data/enemies.json').then(r => r.json()),
        fetch('../assets/data/skills_melee_v4_5.json').then(r => r.json())
      ]);

      const level = levels.level_1_2_acceptance;
      assert(level, '缺少人工验收关卡 level_1_2_acceptance');
      assert(level.waves?.[0]?.enemies?.[0]?.templateId === 'enemy_acceptance_guard', `验收关卡未接入样本敌人: ${level.waves?.[0]?.enemies?.[0]?.templateId}`);

      const enemy = enemies.enemy_acceptance_guard;
      assert(enemy, '缺少样本敌人 enemy_acceptance_guard');
      assert(Array.isArray(enemy.skills) && enemy.skills.includes('skill_block'), '样本敌人缺少修甲技能 skill_block');
      assert(Array.isArray(enemy.skills) && enemy.skills.includes('skill_heal'), '样本敌人缺少回血技能 skill_heal');

      const skillList = Array.isArray(skills.skills) ? skills.skills : [];
      const byId = (id) => skillList.find(skill => skill.id === id);

      assert(byId('skill_demo_hp_guard'), '缺少人工验收技能 skill_demo_hp_guard');
      assert(byId('skill_demo_armor_guard'), '缺少人工验收技能 skill_demo_armor_guard');
      assert(byId('skill_demo_on_hit_armor'), '缺少人工验收技能 skill_demo_on_hit_armor');
      assert(byId('skill_demo_enemy_head_tap'), '缺少护甲验收敌人攻击技能 skill_demo_enemy_head_tap');
      assert(byId('skill_demo_wait'), '缺少敌人样本等待技能 skill_demo_wait');
    }

    async function testAcceptanceLevelsProvideDeterministicEnemyAndPlayerStates() {
      const [levels, enemies] = await Promise.all([
        fetch('../assets/data/levels.json').then(r => r.json()),
        fetch('../assets/data/enemies.json').then(r => r.json())
      ]);

      const onHitLevel = levels.level_1_3_acceptance_on_hit_armor;
      assert(onHitLevel, '缺少受击获甲人工验收关卡 level_1_3_acceptance_on_hit_armor');
      assert(onHitLevel.waves?.[0]?.enemies?.[0]?.templateId === 'enemy_acceptance_head_tapper', `受击获甲验收关卡未接入敌人: ${onHitLevel.waves?.[0]?.enemies?.[0]?.templateId}`);
      assert(onHitLevel.battlePlayerState?.bodyParts?.head?.current === 0, `受击获甲验收关卡未将玩家头部护甲置为 0: ${onHitLevel.battlePlayerState?.bodyParts?.head?.current}`);
      assert(onHitLevel.battlePlayerState?.bodyParts?.head?.max === 20, `受击获甲验收关卡头部护甲上限异常: ${onHitLevel.battlePlayerState?.bodyParts?.head?.max}`);

      const armorGuardLevel = levels.level_1_6_acceptance_armor_guard;
      assert(armorGuardLevel, '缺少护甲免伤人工验收关卡 level_1_6_acceptance_armor_guard');
      assert(armorGuardLevel.waves?.[0]?.enemies?.[0]?.templateId === 'enemy_acceptance_head_tapper', `护甲免伤验收关卡未接入敌人: ${armorGuardLevel.waves?.[0]?.enemies?.[0]?.templateId}`);

      const repairLevel = levels.level_1_4_acceptance_enemy_repair;
      assert(repairLevel, '缺少敌人修甲人工验收关卡 level_1_4_acceptance_enemy_repair');
      assert(repairLevel.waves?.[0]?.enemies?.[0]?.templateId === 'enemy_acceptance_repair', `敌人修甲验收关卡未接入样本敌人: ${repairLevel.waves?.[0]?.enemies?.[0]?.templateId}`);
      assert(Array.isArray(repairLevel.battlePlayerSkills?.learnedAdd) && repairLevel.battlePlayerSkills.learnedAdd.includes('skill_demo_wait'), '敌人修甲验收关卡未注入等待技能');

      const repairEnemy = enemies.enemy_acceptance_repair;
      assert(repairEnemy, '缺少敌人修甲样本 enemy_acceptance_repair');
      assert(repairEnemy.bodyParts?.chest?.current === 4, `敌人修甲样本初始胸部护甲错误: ${repairEnemy.bodyParts?.chest?.current}`);
      assert(Array.isArray(repairEnemy.skills) && repairEnemy.skills.includes('skill_block'), '敌人修甲样本缺少 skill_block');

      const healLevel = levels.level_1_5_acceptance_enemy_heal;
      assert(healLevel, '缺少敌人回血人工验收关卡 level_1_5_acceptance_enemy_heal');
      assert(healLevel.waves?.[0]?.enemies?.[0]?.templateId === 'enemy_acceptance_heal', `敌人回血验收关卡未接入样本敌人: ${healLevel.waves?.[0]?.enemies?.[0]?.templateId}`);
      assert(Array.isArray(healLevel.battlePlayerSkills?.learnedAdd) && healLevel.battlePlayerSkills.learnedAdd.includes('skill_demo_wait'), '敌人回血验收关卡未注入等待技能');

      const healEnemy = enemies.enemy_acceptance_heal;
      assert(healEnemy, '缺少敌人回血样本 enemy_acceptance_heal');
      assert(Number(healEnemy.stats?.hp ?? 0) === 18, `敌人回血样本初始 HP 错误: ${healEnemy.stats?.hp}`);
      assert(Array.isArray(healEnemy.skills) && healEnemy.skills.includes('skill_heal'), '敌人回血样本缺少 skill_heal');

      const armorEnemy = enemies.enemy_acceptance_head_tapper;
      assert(armorEnemy, '缺少护甲验收样本 enemy_acceptance_head_tapper');
      assert(Array.isArray(armorEnemy.skills) && armorEnemy.skills.includes('skill_demo_enemy_head_tap'), '护甲验收样本缺少固定头部攻击技能');
    }

    async function testAcceptanceDefenseSkillsResolveBeforeAcceptanceEnemyAttack() {
      const [enemies, skills] = await Promise.all([
        fetch('../assets/data/enemies.json').then(r => r.json()),
        fetch('../assets/data/skills_melee_v4_5.json').then(r => r.json())
      ]);

      const enemy = enemies.enemy_acceptance_guard;
      assert(enemy, '缺少样本敌人 enemy_acceptance_guard');

      const skillList = Array.isArray(skills.skills) ? skills.skills : [];
      const byId = (id) => skillList.find(skill => skill.id === id);
      const enemyBaseSpeed = Number(enemy.stats?.speed ?? 0) || 0;

      for (const id of ['skill_demo_hp_guard', 'skill_demo_armor_guard', 'skill_demo_on_hit_armor']) {
        const skill = byId(id);
        assert(skill, `缺少验收技能 ${id}`);
        const totalSpeed = enemyBaseSpeed - 1; // keep lint of usage? placeholder
        void totalSpeed;
        const battleSpeed = (Number(skill.speed ?? 0) || 0) + 1; // player base speed from player.json
        assert(battleSpeed > enemyBaseSpeed, `验收技能 ${id} 速度不足，无法稳定先于样本敌人执行: ${battleSpeed} <= ${enemyBaseSpeed}`);
      }
    }

    async function testEnemyPlannerPrefersArmorRepairWhenDamaged() {
      const skills = {
        skill_bite: {
          id: 'skill_bite',
          target: {
            subject: 'SUBJECT_ENEMY',
            scope: 'SCOPE_PART',
            selection: { candidateParts: ['head', 'chest', 'abdomen', 'arm', 'leg'] }
          },
          actions: [{ effect: { effectType: 'DMG_ARMOR', amount: 10 } }],
          costs: { ap: 1 },
          speed: 0
        },
        skill_block: {
          id: 'skill_block',
          target: {
            subject: 'SUBJECT_SELF',
            scope: 'SCOPE_PART',
            selection: { candidateParts: ['head', 'chest', 'abdomen', 'arm', 'leg'] }
          },
          actions: [{ effect: { effectType: 'ARMOR_ADD', amount: 10 } }],
          costs: { ap: 1 },
          speed: 5
        }
      };

      const planner = new EnemyActionPlanner({
        getSkillConfig: (skillId) => skills[skillId]
      });

      const enemy = {
        id: 'enemy_1',
        stats: { hp: 100, maxHp: 100, speed: 5, ap: 3 },
        bodyParts: {
          head: { current: 20, max: 20, weakness: 1 },
          chest: { current: 4, max: 40, weakness: 1 },
          abdomen: { current: 20, max: 20, weakness: 1 },
          arm: { current: 20, max: 20, weakness: 1 },
          leg: { current: 20, max: 20, weakness: 1 }
        },
        skills: ['skill_bite', 'skill_block']
      };

      const player = {
        id: 'player_1',
        stats: { hp: 100, maxHp: 100 },
        bodyParts: {
          head: { current: 20, max: 20, weakness: 1.5 },
          chest: { current: 5, max: 20, weakness: 1 },
          abdomen: { current: 20, max: 20, weakness: 1 },
          arm: { current: 20, max: 20, weakness: 1 },
          leg: { current: 20, max: 20, weakness: 1 }
        }
      };

      const plan = planner.planTurn({ enemy, player, playerBodyParts: player.bodyParts });
      assert(plan, 'EnemyActionPlanner 未返回规划结果');
      assert(plan.skillId === 'skill_block', `受伤敌人未优先修甲，实际选择: ${plan.skillId}`);
      assert(plan.targetId === 'enemy_1', `修甲技能 targetId 错误: ${plan.targetId}`);
      assert(plan.bodyPart === 'chest', `修甲技能未选择最破损部位: ${plan.bodyPart}`);
    }

    async function testBuffSystemApCostReduceAndCounter() {
      const raw = await fetch('../assets/data/buffs_v2_7.json').then(r => r.json());
      const eventBus = new EventBus.constructor();
      const registry = new BuffRegistry(raw.buffs);
      const system = new BuffSystem(eventBus, registry);
      system.start();

      const actor = {
        id: 'player_1',
        stats: { hp: 100, maxHp: 100, ap: 3 },
        bodyParts: { chest: { current: 10, max: 10 } }
      };
      actor.buffs = new BuffManager(actor, registry, eventBus);
      system.registerManager(actor.buffs);
      actor.buffs.add('new_buff_1771485482007', { params: { apReduceVal: 1 } });

      eventBus.emit('TURN_START', { turn: 1 });
      assert(actor._planningApCostFlatDelta === -1, `AP 降耗 Buff 未生效: ${actor._planningApCostFlatDelta}`);

      const defender = {
        id: 'enemy_1',
        stats: { hp: 100, maxHp: 100, ap: 3 },
        bodyParts: { chest: { current: 10, max: 10 } }
      };
      defender.buffs = new BuffManager(defender, registry, eventBus);
      system.registerManager(defender.buffs);
      defender.buffs.add('buff_counter');

      let counterPayload = null;
      eventBus.on('BUFF_ATTACK_REQUEST', (payload) => {
        counterPayload = payload;
      });

      eventBus.emit('BATTLE_DEFEND_POST', {
        attacker: actor,
        target: defender,
        damageTaken: 5,
        bodyPart: 'chest'
      });

      assert(counterPayload, '反击 Buff 未发出 BUFF_ATTACK_REQUEST');
      assert(counterPayload.target === actor, '反击目标错误');
      assert(counterPayload.source === defender, '反击来源错误');
    }

    async function testBuffSystemPreventHpDamageInBattlePipeline() {
      const raw = await fetch('../assets/data/buffs_v2_7.json').then(r => r.json());
      const eventBus = new EventBus.constructor();
      const registry = new BuffRegistry(raw.buffs);
      const system = new BuffSystem(eventBus, registry);
      system.start();

      const driver = createBattleDriver(eventBus);
      const attacker = createCombatant({
        id: 'enemy_1',
        bodyParts: { chest: { current: 0, max: 0, weakness: 1 } }
      });
      const defender = createCombatant({
        id: 'player_1',
        bodyParts: { chest: { current: 0, max: 10, weakness: 1 } }
      });

      defender.buffs = new BuffManager(defender, registry, eventBus);
      system.registerManager(defender.buffs);
      defender.buffs.add('new_buff_1771481936095');

      const outcome = driver._applyBattleDamage({
        attacker,
        target: defender,
        skillId: 'skill_test_hp_guard',
        bodyPart: 'chest',
        rawDamage: 8
      });

      assert(outcome.damage === 0, `HP 免伤后仍造成 HP 伤害: ${outcome.damage}`);
      assert(defender.stats.hp === 100, `HP 免伤后生命值仍下降: ${defender.stats.hp}`);
    }

    async function testEnemyPlannerPrefersHealWhenLowHp() {
      const skills = {
        skill_bite: {
          id: 'skill_bite',
          target: {
            subject: 'SUBJECT_ENEMY',
            scope: 'SCOPE_PART',
            selection: { candidateParts: ['head', 'chest', 'abdomen'] }
          },
          actions: [{ effect: { effectType: 'DMG_HP', amount: 16 } }],
          costs: { ap: 1 },
          speed: 0
        },
        skill_recover: {
          id: 'skill_recover',
          target: {
            subject: 'SUBJECT_SELF',
            scope: 'SCOPE_ENTITY',
            selection: {}
          },
          actions: [{ effect: { effectType: 'HEAL', amount: 20 } }],
          costs: { ap: 1 },
          speed: 2
        }
      };

      const planner = new EnemyActionPlanner({
        getSkillConfig: (skillId) => skills[skillId]
      });

      const enemy = {
        id: 'enemy_1',
        stats: { hp: 18, maxHp: 100, speed: 5, ap: 3 },
        bodyParts: {
          head: { current: 10, max: 10, weakness: 1 },
          chest: { current: 20, max: 20, weakness: 1 },
          abdomen: { current: 10, max: 10, weakness: 1 }
        },
        skills: ['skill_bite', 'skill_recover']
      };

      const player = {
        id: 'player_1',
        stats: { hp: 100, maxHp: 100 },
        bodyParts: {
          head: { current: 15, max: 15, weakness: 1.4 },
          chest: { current: 20, max: 20, weakness: 1 },
          abdomen: { current: 20, max: 20, weakness: 1 }
        }
      };

      const plan = planner.planTurn({ enemy, player, playerBodyParts: player.bodyParts });
      assert(plan, 'EnemyActionPlanner 未返回低血量规划结果');
      assert(plan.skillId === 'skill_recover', `低血量敌人未优先回血，实际选择: ${plan.skillId}`);
      assert(plan.targetId === 'enemy_1', `回血技能目标错误: ${plan.targetId}`);
    }

    function testTurnPlannerUsesSlotPartForMultiSelect() {
      const planner = new TurnPlanner({
        getSlotLayout: () => ({
          slotCounts: {
            head: { enemy: 1, self: 1 },
            chest: { enemy: 1, self: 1 }
          }
        }),
        getPlayerId: () => 'player_1',
        getSkillConfig: () => ({
          id: 'skill_multi',
          target: {
            selection: {
              selectCount: 4
            }
          }
        }),
        getCurrentAp: () => 10,
        getUsedAp: () => 0
      });

      planner.enterPlanning({
        availableAp: 10,
        effectiveApCostBySkill: { skill_multi: 1 }
      });

      const result = planner.planMany({
        planningDraftBySkill: {
          skill_multi: {
            skillId: 'skill_multi',
            targetId: 'enemy_1',
            bodyPart: 'chest',
            cost: 1,
            speed: 0,
            placedSlots: ['enemy:head:0', 'enemy:chest:0'],
            selectionResult: { selectedParts: ['head', 'chest'] }
          }
        }
      });

      assert(result.ok, 'TurnPlanner.planMany 返回失败');
      const actions = planner.getPlannedActions();
      assert(actions.length === 2, 'TurnPlanner 未生成 2 个动作');
      assert(actions[0].bodyPart === 'head', `第 1 个动作 bodyPart 错误: ${actions[0].bodyPart}`);
      assert(actions[1].bodyPart === 'chest', `第 2 个动作 bodyPart 错误: ${actions[1].bodyPart}`);
    }

    function testSkillPanelKeepsBattleInjectedSkillsOnGenericDataUpdate() {
      document.body.innerHTML = '<div id="summary"></div><pre id="log"></pre>';
      setupSkillPanelDom();

      const engine = {
        eventBus: createEventBus(),
        fsm: { currentState: 'BATTLE_LOOP' },
        data: {
          playerData: {
            id: 'player_1',
            stats: { ap: 6, maxAp: 6 },
            skills: {
              skillTreeId: 'melee_v4_5',
              skillPoints: 30,
              learned: ['skill_heal']
            }
          },
          getSkillConfig(id) {
            const map = {
              skill_heal: {
                id: 'skill_heal',
                name: '治疗',
                costs: { ap: 2 },
                target: { subject: 'SUBJECT_SELF', scope: 'SCOPE_ENTITY', selection: { mode: 'single', selectCount: 1 } }
              },
              skill_demo_hp_guard: {
                id: 'skill_demo_hp_guard',
                name: 'HP免伤演示',
                costs: { ap: 1 },
                target: { subject: 'SUBJECT_SELF', scope: 'SCOPE_ENTITY', selection: { mode: 'single', selectCount: 1 } }
              }
            };
            return map[id] || null;
          }
        },
        playerSkillQueue: [],
        turnPlanner: {
          getApBudgetState() {
            return {
              phase: 'AP_BUDGET_READY',
              availableAp: 6,
              plannedCost: 0,
              remaining: 6,
              ok: true
            };
          }
        }
      };

      const panel = new UI_SkillPanel(engine);
      panel.onBattleStart({
        player: {
          skills: {
            skillTreeId: 'melee_v4_5',
            skillPoints: 30,
            learned: ['skill_heal', 'skill_demo_hp_guard']
          }
        },
        level: {
          enemies: [{ id: 'enemy_1', bodyParts: { head: { max: 10 }, chest: { max: 10 }, abdomen: { max: 10 } } }]
        }
      });

      assert(panel.cachedSkills.some(skill => skill.id === 'skill_demo_hp_guard'), 'BATTLE_START 后未载入战斗注入技能');

      panel.onDataUpdate({ data: { hp: 100 } });

      assert(panel.cachedSkills.some(skill => skill.id === 'skill_demo_hp_guard'), '通用 DATA_UPDATE 后丢失了战斗注入技能');
    }

    function testSkillTreeCommitUsesEngineSavePath() {
      const modal = new UI_SkillTreeModal();
      let engineSaveCalls = 0;
      let dataSaveCalls = 0;
      modal.engine = {
        saveGame() {
          engineSaveCalls += 1;
        },
        data: {
          playerData: {
            skills: {
              learned: [],
              skillPoints: 5
            }
          },
          saveGame() {
            dataSaveCalls += 1;
          }
        },
        eventBus: createEventBus()
      };
      modal._skillsMap = {
        skill_a: {
          id: 'skill_a',
          unlock: { cost: { kp: 2 } }
        }
      };
      modal._skillsList = [modal._skillsMap.skill_a];
      modal._sessionSnapshot = {
        skillPoints: 5,
        learned: [],
        selectedSkillId: 'skill_a'
      };
      modal._stagedLearned = new Set(['skill_a']);
      modal._handleClose = () => {};

      modal._handleCommitAndClose();

      assert(engineSaveCalls === 1, `engine.saveGame 调用次数错误: ${engineSaveCalls}`);
      assert(dataSaveCalls === 0, `不应直接调用 engine.data.saveGame: ${dataSaveCalls}`);
    }

    const tests = [
      ['mock_ui_v11 使用唯一引擎实例', testMockUiUsesSingletonEngine],
      ['CoreEngine 战斗保存同步 currentScene/battleState', testCoreEngineBattleSaveSyncContract],
      ['验收关卡与样本敌人/技能已配置', testAcceptanceLevelProvidesManualVerificationEntry],
      ['验收关卡提供确定性的玩家与敌人状态', testAcceptanceLevelsProvideDeterministicEnemyAndPlayerStates],
      ['验收防御技能会先于样本敌人执行', testAcceptanceDefenseSkillsResolveBeforeAcceptanceEnemyAttack],
      ['CoreEngine 在战斗开始时注入关卡验收技能', testCoreEngineInjectsLevelBattleSkillsIntoBattleStartPayload],
      ['CoreEngine 在战斗开始时应用关卡玩家战斗态覆盖', testCoreEngineAppliesLevelBattlePlayerStateOverridesAtBattleStart],
      ['DataManager.instantiateLevel 保留验收敌人的残甲状态', testDataManagerInstantiateLevelPreservesConfiguredEnemyCurrentArmor],
      ['EnemyActionPlanner 受损时优先修甲', testEnemyPlannerPrefersArmorRepairWhenDamaged],
      ['EnemyActionPlanner 低血量时优先回血', testEnemyPlannerPrefersHealWhenLowHp],
      ['BuffSystem 触发降耗与反击', testBuffSystemApCostReduceAndCounter],
      ['BuffSystem 战斗管线中的 HP 免伤', testBuffSystemPreventHpDamageInBattlePipeline],
      ['BuffSystem 战斗管线中的护甲免伤', testBuffSystemPreventArmorDamageKeepsArmorAndHp],
      ['BuffSystem 直伤护甲也会触发护甲免伤', testBuffSystemPreventArmorDamageForDirectArmorEffects],
      ['BuffSystem 受击前获甲后由护甲吸收伤害', testBuffSystemHealArmorBeforeTakingDamage],
      ['BuffSystem 直伤护甲前也会先触发受击获甲', testBuffSystemHealArmorBeforeDirectArmorEffects],
      ['TurnPlanner 多选动作使用各自槽位部位', testTurnPlannerUsesSlotPartForMultiSelect],
      ['UI_SkillPanel 接受 SCOPE_MULTI_PARTS', testSkillPanelAcceptsMultiPartScope],
      ['UI_SkillPanel 通用 DATA_UPDATE 不应丢失战斗注入技能', testSkillPanelKeepsBattleInjectedSkillsOnGenericDataUpdate],
      ['UI_SkillPanel 仅高亮 candidateParts', testSkillPanelHighlightsCandidatePartsOnly],
      ['UI_SkillTreeModal 走 engine.saveGame 保存路径', testSkillTreeCommitUsesEngineSavePath]
    ];

    let passed = 0;
    let failed = 0;
    for (const [name, fn] of tests) {
      try {
        await fn();
        passed += 1;
        log(`PASS ${name}`);
      } catch (error) {
        failed += 1;
        log(`FAIL ${name}: ${error.message}`);
      }
    }

    summaryEl.innerHTML = `
      <p class="${failed === 0 ? 'pass' : 'fail'}">
        通过 ${passed} / ${tests.length}，失败 ${failed}
      </p>
    `;
  </script>
