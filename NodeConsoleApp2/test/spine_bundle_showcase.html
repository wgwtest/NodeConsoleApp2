<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spine Bundle Showcase</title>
    <link rel="stylesheet" href="../node_modules/@esotericsoftware/spine-player/dist/spine-player.css">
    <style>
        :root {
            --ink: #132033;
            --muted: #526074;
            --line: rgba(18, 32, 51, 0.12);
            --surface: rgba(255, 252, 247, 0.9);
            --accent: #c85f3b;
            --accent-2: #2f7d90;
            --success: #237159;
            --shadow: 0 22px 54px rgba(19, 32, 51, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "Segoe UI", "PingFang SC", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(255, 213, 145, 0.8), transparent 28%),
                radial-gradient(circle at top right, rgba(125, 182, 214, 0.34), transparent 22%),
                linear-gradient(180deg, #fbf4ea 0%, #f3ede4 48%, #f4efe8 100%);
        }

        a {
            color: inherit;
        }

        .page {
            width: min(1440px, calc(100% - 40px));
            margin: 0 auto;
            padding: 28px 0 40px;
            display: grid;
            gap: 18px;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--surface);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .hero {
            overflow: hidden;
            position: relative;
            padding: 28px;
            display: grid;
            gap: 18px;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: auto -10% -42% auto;
            width: 420px;
            height: 420px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(200, 95, 59, 0.16), transparent 68%);
            pointer-events: none;
        }

        .eyebrow {
            margin: 0;
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .hero h1,
        .hero p,
        .showcase-card h2,
        .showcase-card h3,
        .showcase-card p,
        .meta-card p {
            margin: 0;
        }

        .hero h1 {
            font-size: clamp(34px, 5vw, 56px);
            line-height: 0.95;
            letter-spacing: -0.04em;
            max-width: 10ch;
        }

        .hero-copy {
            display: grid;
            gap: 12px;
            max-width: 780px;
            position: relative;
            z-index: 1;
        }

        .hero-copy p {
            color: var(--muted);
            line-height: 1.7;
            font-size: 15px;
        }

        .hero-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .hero-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.72);
            text-decoration: none;
            font-weight: 600;
        }

        .hero-link.primary {
            background: linear-gradient(135deg, var(--accent), #dc8a53);
            border-color: transparent;
            color: #fff;
        }

        .meta-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .meta-card {
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.72);
            display: grid;
            gap: 8px;
        }

        .meta-card span {
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .meta-card strong {
            font-size: 18px;
        }

        .showcase-stage {
            padding: 22px;
            display: grid;
            gap: 18px;
        }

        .stage-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            align-items: end;
        }

        .stage-header p {
            color: var(--muted);
            line-height: 1.7;
            max-width: 720px;
        }

        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 18px;
        }

        .showcase-card {
            border: 1px solid var(--line);
            border-radius: 22px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(251, 247, 241, 0.92)),
                radial-gradient(circle at top right, rgba(47, 125, 144, 0.1), transparent 36%);
            padding: 18px;
            display: grid;
            gap: 14px;
        }

        .showcase-card header {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: start;
        }

        .showcase-card header p {
            color: var(--muted);
            line-height: 1.55;
            max-width: 36ch;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 32px;
            padding: 0 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-pill.ok {
            color: var(--success);
            background: rgba(35, 113, 89, 0.12);
        }

        .status-pill.warn {
            color: var(--accent);
            background: rgba(200, 95, 59, 0.12);
        }

        .player-shell {
            min-height: 420px;
            border-radius: 18px;
            border: 1px solid rgba(200, 95, 59, 0.18);
            background:
                radial-gradient(circle at center, rgba(255, 255, 255, 0.95), rgba(243, 231, 214, 0.82)),
                linear-gradient(180deg, rgba(254, 251, 246, 0.95), rgba(241, 232, 221, 0.95));
            overflow: hidden;
            position: relative;
        }

        .player-shell::after {
            content: "";
            position: absolute;
            inset: auto 16px 12px 16px;
            height: 18px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(19, 32, 51, 0.18), transparent 70%);
            filter: blur(8px);
            pointer-events: none;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: end;
        }

        .controls-row label,
        .controls-meta {
            display: grid;
            gap: 6px;
        }

        .controls-label {
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .controls-row select,
        .controls-row button,
        .preset-button {
            min-height: 42px;
            padding: 0 14px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.8);
            color: var(--ink);
            font: inherit;
        }

        .controls-row button,
        .preset-button {
            cursor: pointer;
        }

        .preset-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .preset-button.is-active {
            background: linear-gradient(135deg, var(--accent), #d97a49);
            border-color: transparent;
            color: #fff;
        }

        .controls-meta {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .mini-card {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.7);
            display: grid;
            gap: 6px;
        }

        .mini-card span {
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .empty-state {
            border: 1px dashed var(--line);
            border-radius: 18px;
            padding: 18px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.56);
        }

        @media (max-width: 820px) {
            .page {
                width: min(100% - 20px, 1440px);
                padding-top: 14px;
            }

            .hero,
            .showcase-stage {
                padding: 18px;
            }

            .showcase-grid {
                grid-template-columns: 1fr;
            }

            .player-shell {
                min-height: 320px;
            }

            .controls-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="page" id="app">
    <section class="panel hero">
        <div class="hero-copy">
            <p class="eyebrow">Standalone Playback Demo</p>
            <h1>Spine Bundle Showcase</h1>
            <p>这个页面只负责“看效果”。它直接消费 probe report 里已经 staged 好的官方导出物，展示可播放角色、快捷动作和当前初始动画，不接入主战斗流程。</p>
            <div class="hero-links">
                <a class="hero-link primary" id="probe-link" href="./spine_bundle_probe.html">查看完整 Probe 诊断</a>
                <a class="hero-link" href="?animation_spineboy=run&animation_raptor=roar">载入推荐动作组合</a>
            </div>
        </div>
        <div class="meta-strip" id="hero-meta"></div>
    </section>
</main>

<script src="../node_modules/@esotericsoftware/spine-player/dist/iife/spine-player.js"></script>
<script src="../test-results/spine_bundle_probe_report.js"></script>
<script>
    const app = document.getElementById('app');
    const probeLink = document.getElementById('probe-link');
    const heroMeta = document.getElementById('hero-meta');
    const probeReport = globalThis.__SPINE_BUNDLE_PROBE_REPORT__;
    const playerRegistry = new Map();
    const playbackReturnTimers = new Map();
    const searchParams = new URLSearchParams(window.location.search);
    const playbackPresetCatalog = {
        spineboy: [
            { key: 'walk', label: 'Walk', animation: 'walk', loop: true },
            { key: 'run', label: 'Run', animation: 'run', loop: true },
            { key: 'shoot', label: 'Shoot', animation: 'shoot', loop: false, fallbackAnimation: 'walk' },
            { key: 'jump', label: 'Jump', animation: 'jump', loop: false, fallbackAnimation: 'walk' }
        ],
        raptor: [
            { key: 'walk', label: 'Walk', animation: 'walk', loop: true },
            { key: 'roar', label: 'Roar', animation: 'roar', loop: false, fallbackAnimation: 'walk' },
            { key: 'jump', label: 'Jump', animation: 'jump', loop: false, fallbackAnimation: 'walk' }
        ]
    };

    function toPlayerAssetUrl(relativePath) {
        return `../test-results/${relativePath}`;
    }

    function getRuntimeEntries() {
        return Array.isArray(probeReport?.runtimePreview?.characters) ? probeReport.runtimePreview.characters : [];
    }

    function getEntryAnimations(entry) {
        return Array.isArray(entry?.animations) ? entry.animations : [];
    }

    function getInitialAnimation(entry) {
        const requested = searchParams.get(`animation_${entry.presentationId}`);
        const animations = getEntryAnimations(entry);
        if (requested && animations.includes(requested)) {
            return requested;
        }

        return entry.defaultAnimation || animations[0] || '';
    }

    function getPlaybackPresets(entry) {
        const declared = playbackPresetCatalog[entry?.presentationId] || [];
        const animations = new Set(getEntryAnimations(entry));

        return declared
            .filter(preset => animations.has(preset.animation))
            .map(preset => ({
                ...preset,
                fallbackAnimation: animations.has(preset.fallbackAnimation)
                    ? preset.fallbackAnimation
                    : entry.defaultAnimation || preset.animation
            }));
    }

    function clearPlaybackReturnTimer(presentationId) {
        const timerId = playbackReturnTimers.get(presentationId);
        if (timerId) {
            window.clearTimeout(timerId);
            playbackReturnTimers.delete(presentationId);
        }
    }

    function estimateAnimationDurationMs(player, animation) {
        const durationSeconds = player?.skeleton?.data?.findAnimation(animation)?.duration;
        if (typeof durationSeconds !== 'number' || Number.isNaN(durationSeconds) || durationSeconds <= 0) {
            return 800;
        }

        return Math.max(250, Math.round(durationSeconds * 1000));
    }

    function findLoopPreset(presets, animation) {
        return presets.find(preset => preset.loop && preset.animation === animation) || null;
    }

    function getShowcaseCard(presentationId) {
        return app.querySelector(`.showcase-card[data-presentation-id="${presentationId}"]`);
    }

    function syncAnimationSelect(card, animation) {
        const select = card?.querySelector('.js-animation-select');
        if (!select) return;

        const option = [...select.options].find(item => item.value === animation);
        if (option) {
            select.value = animation;
        }
    }

    function syncActivePresetButton(card, presetKey) {
        const buttons = card?.querySelectorAll('.js-preset-button') || [];
        buttons.forEach(button => {
            button.classList.toggle('is-active', button.dataset.presetKey === presetKey);
        });
    }

    function syncAnimationLabel(card, animationLabel) {
        const label = card?.querySelector('.js-current-animation');
        if (label) {
            label.textContent = animationLabel || 'none';
        }
    }

    function resolvePresetFallbackAnimation(entry, card, preset, presets) {
        const select = card?.querySelector('.js-animation-select');
        const selectedLoopPreset = findLoopPreset(presets, select?.value);
        if (selectedLoopPreset && selectedLoopPreset.animation !== preset.animation) {
            return selectedLoopPreset.animation;
        }

        const defaultLoopPreset = findLoopPreset(presets, entry.defaultAnimation);
        if (defaultLoopPreset && defaultLoopPreset.animation !== preset.animation) {
            return defaultLoopPreset.animation;
        }

        if (preset.fallbackAnimation && preset.fallbackAnimation !== preset.animation) {
            return preset.fallbackAnimation;
        }

        return entry.defaultAnimation || preset.animation;
    }

    function applyPlaybackPreset(presentationId, presetKey) {
        const player = playerRegistry.get(presentationId);
        const entry = getRuntimeEntries().find(item => item.presentationId === presentationId);
        const card = getShowcaseCard(presentationId);
        const presets = getPlaybackPresets(entry);
        const preset = presets.find(item => item.key === presetKey);
        const toggle = card?.querySelector('.js-playback-toggle');

        if (!player || !entry || !card || !preset) return;

        clearPlaybackReturnTimer(presentationId);

        if (preset.loop) {
            player.setAnimation(preset.animation, true);
            syncAnimationSelect(card, preset.animation);
            syncAnimationLabel(card, preset.animation);
            syncActivePresetButton(card, preset.key);
        } else {
            const fallbackAnimation = resolvePresetFallbackAnimation(entry, card, preset, presets);
            player.setAnimation(preset.animation, false);
            if (fallbackAnimation) {
                player.addAnimation(fallbackAnimation, true, 0);
            }

            syncAnimationLabel(
                card,
                fallbackAnimation && fallbackAnimation !== preset.animation
                    ? `${preset.animation} -> ${fallbackAnimation}`
                    : preset.animation
            );
            syncActivePresetButton(card, preset.key);

            const timerId = window.setTimeout(() => {
                if (fallbackAnimation) {
                    syncAnimationSelect(card, fallbackAnimation);
                    syncAnimationLabel(card, fallbackAnimation);
                }

                const fallbackPreset = findLoopPreset(presets, fallbackAnimation);
                syncActivePresetButton(card, fallbackPreset?.key || null);
                playbackReturnTimers.delete(presentationId);
            }, estimateAnimationDurationMs(player, preset.animation));
            playbackReturnTimers.set(presentationId, timerId);
        }

        player.play();
        if (toggle) {
            toggle.textContent = 'Pause';
        }
    }

    function mountShowcasePlayers() {
        if (!globalThis.spine || typeof globalThis.spine.SpinePlayer !== 'function') {
            return;
        }

        const roots = app.querySelectorAll('.js-showcase-player');
        roots.forEach(root => {
            const presentationId = root.dataset.presentationId;
            const entry = getRuntimeEntries().find(item => item.presentationId === presentationId);
            if (!entry) return;

            new globalThis.spine.SpinePlayer(root, {
                jsonUrl: root.dataset.skeletonUrl,
                atlasUrl: root.dataset.atlasUrl,
                animation: root.dataset.animation || undefined,
                skin: root.dataset.skin || undefined,
                scale: Number(root.dataset.scale || '1'),
                alpha: true,
                backgroundColor: '#00000000',
                preserveDrawingBuffer: false,
                showControls: true,
                showLoading: true,
                success(player) {
                    const card = getShowcaseCard(presentationId);
                    const presets = getPlaybackPresets(entry);
                    const initialAnimation = getInitialAnimation(entry);
                    const select = card?.querySelector('.js-animation-select');
                    const toggle = card?.querySelector('.js-playback-toggle');
                    const presetButtons = card?.querySelectorAll('.js-preset-button') || [];

                    playerRegistry.set(presentationId, player);
                    root.dataset.runtimeMounted = 'true';
                    syncAnimationLabel(card, initialAnimation);
                    syncActivePresetButton(card, findLoopPreset(presets, initialAnimation)?.key || null);

                    if (select) {
                        select.addEventListener('change', () => {
                            if (!select.value) return;
                            clearPlaybackReturnTimer(presentationId);
                            player.setAnimation(select.value, true);
                            syncAnimationLabel(card, select.value);
                            syncActivePresetButton(card, findLoopPreset(presets, select.value)?.key || null);
                            player.play();
                            if (toggle) {
                                toggle.textContent = 'Pause';
                            }
                        });
                    }

                    if (toggle) {
                        toggle.addEventListener('click', () => {
                            if (player.paused) {
                                player.play();
                                toggle.textContent = 'Pause';
                                return;
                            }

                            player.pause();
                            toggle.textContent = 'Play';
                        });
                    }

                    presetButtons.forEach(button => {
                        button.addEventListener('click', () => {
                            applyPlaybackPreset(presentationId, button.dataset.presetKey);
                        });
                    });

                    player.play();
                },
                error(player, message) {
                    root.innerHTML = `<div class="empty-state">动态播放加载失败：${message}</div>`;
                }
            });
        });
    }

    function renderHeroMeta() {
        const runtimeEntries = getRuntimeEntries();
        const readyCount = runtimeEntries.filter(entry => entry.runtimeReady).length;
        const cards = [
            {
                label: 'Bundle Id',
                value: probeReport?.bundle?.bundleId || 'unknown'
            },
            {
                label: 'Runtime Ready',
                value: `${readyCount}/${runtimeEntries.length || 0}`
            },
            {
                label: 'Recommended URL',
                value: 'spineboy=run / raptor=roar'
            },
            {
                label: 'Fallback',
                value: probeReport?.fallback?.decision || 'unknown'
            }
        ];

        heroMeta.innerHTML = cards.map(card => `
            <article class="meta-card">
                <span>${card.label}</span>
                <strong>${card.value}</strong>
            </article>
        `).join('');
    }

    function renderShowcase() {
        const entries = getRuntimeEntries();
        const queryString = searchParams.toString();
        if (probeLink) {
            probeLink.href = `./spine_bundle_probe.html${queryString ? `?${queryString}` : ''}`;
        }

        if (!probeReport) {
            app.insertAdjacentHTML('beforeend', `
                <section class="panel showcase-stage">
                    <div class="empty-state">未加载到 <code>spine_bundle_probe_report.js</code>，请先运行构建脚本生成报告。</div>
                </section>
            `);
            return;
        }

        const cards = entries.map(entry => {
            const initialAnimation = getInitialAnimation(entry);
            const presets = getPlaybackPresets(entry);
            const animations = getEntryAnimations(entry);

            if (!entry.runtimeReady) {
                return `
                    <article class="showcase-card" data-presentation-id="${entry.presentationId}">
                        <header>
                            <div>
                                <p class="eyebrow">Runtime Fallback</p>
                                <h2>${entry.presentationId}</h2>
                                <p>该角色当前未进入独立展示区。</p>
                            </div>
                            <span class="status-pill warn">${entry.reason || 'runtime_unavailable'}</span>
                        </header>
                        <div class="empty-state">缺失原因：<code>${entry.reason || 'unknown'}</code></div>
                    </article>
                `;
            }

            return `
                <article class="showcase-card" data-presentation-id="${entry.presentationId}">
                    <header>
                        <div>
                            <p class="eyebrow">Playable Sample</p>
                            <h2>${entry.presentationId}</h2>
                            <p>从官方导出物 staged runtime 资产直接播放，适合快速给出“能不能动、动起来像不像”的直观演示。</p>
                        </div>
                        <span class="status-pill ok">runtime_ready</span>
                    </header>
                    <div
                        class="player-shell js-showcase-player"
                        data-presentation-id="${entry.presentationId}"
                        data-skeleton-url="${toPlayerAssetUrl(entry.skeletonUrl)}"
                        data-atlas-url="${toPlayerAssetUrl(entry.atlasUrl)}"
                        data-animation="${initialAnimation}"
                        data-skin="${entry.defaultSkin || ''}"
                        data-scale="${entry.scale || 1}"
                    ></div>
                    <div class="controls-row">
                        <label>
                            <span class="controls-label">Animation</span>
                            <select class="js-animation-select" data-presentation-id="${entry.presentationId}">
                                ${animations.map(animation => `
                                    <option value="${animation}" ${animation === initialAnimation ? 'selected' : ''}>${animation}</option>
                                `).join('')}
                            </select>
                        </label>
                        <button class="js-playback-toggle" data-presentation-id="${entry.presentationId}" type="button">Pause</button>
                    </div>
                    <div class="controls-meta">
                        <div class="mini-card">
                            <span>Current</span>
                            <strong class="js-current-animation">${initialAnimation || 'none'}</strong>
                        </div>
                        <div class="mini-card">
                            <span>Skin</span>
                            <strong>${entry.defaultSkin || 'default'}</strong>
                        </div>
                        <div class="mini-card">
                            <span>Scale</span>
                            <strong>${entry.scale || 1}</strong>
                        </div>
                    </div>
                    <div class="controls-meta">
                        <div class="mini-card" style="grid-column: 1 / -1;">
                            <span>Quick Actions</span>
                            <div class="preset-row">
                                ${presets.map(preset => `
                                    <button
                                        class="preset-button js-preset-button"
                                        data-presentation-id="${entry.presentationId}"
                                        data-preset-key="${preset.key}"
                                        type="button"
                                    >${preset.label}</button>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </article>
            `;
        }).join('');

        app.insertAdjacentHTML('beforeend', `
            <section class="panel showcase-stage">
                <div class="stage-header">
                    <div>
                        <p class="eyebrow">Focused Demo Surface</p>
                        <h2>Showcase Stage</h2>
                    </div>
                    <p>如果你只想直观看角色播放状态，优先看这里。完整 bundle 诊断、角色 manifest 和回退信息仍然保留在 <code>spine_bundle_probe.html</code>。</p>
                </div>
                <div class="showcase-grid">${cards}</div>
            </section>
        `);

        mountShowcasePlayers();
    }

    renderHeroMeta();
    renderShowcase();
</script>
</body>
</html>
